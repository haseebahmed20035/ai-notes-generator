name: Sync to Hugging Face Space

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git clone https://haseebahmed2003:$HF_TOKEN@huggingface.co/spaces/haseebahmed2003/ai-notes-generator hf-space
          rsync -av --exclude='.git' --exclude='hf-space' ./ hf-space/
          cd hf-space
          git add .
          git commit -m "Sync from GitHub" || echo "No changes"
          git push